# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fly-voice-agent-red-darkness-2650'
primary_region = 'sea'  # Seattle - closest to Alberta (~15-25ms)

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Run 24/7
  auto_start_machines = true
  min_machines_running = 1    # Always keep one warm
  processes = ['app']

[[vm]]
  memory = '2gb'  # Performance CPU requires minimum 2GB
  cpu_kind = 'performance'  # Dedicated CPU - consistent latency for voice
  cpus = 1
